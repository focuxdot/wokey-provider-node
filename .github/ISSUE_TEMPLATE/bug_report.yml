name: Bug report
description: Report a problem with Wokey Provider Node
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include OAuth tokens, API keys, cookies, or authorization headers
        in this report. For security vulnerabilities, follow SECURITY.md instead
        of opening a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Provider Node version
      description: From `wokey-node status` or the console footer.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant log output (redact any secrets). This will be rendered as code.
      render: shell
    validations:
      required: false
