name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run audit:oss
      - run: npm audit --omit=dev

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve build metadata
        id: meta
        run: |
          echo "commit_short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u '+%Y-%m-%dT%H:%M:%S.000Z')" >> "$GITHUB_OUTPUT"
      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            PROVIDER_NODE_GIT_COMMIT=${{ steps.meta.outputs.commit_short }}
            PROVIDER_NODE_GIT_DIRTY=0
            PROVIDER_NODE_BUILD_AT=${{ steps.meta.outputs.built_at }}
      - name: Build local smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: wokey-provider-node:ci
          build-args: |
            PROVIDER_NODE_GIT_COMMIT=${{ steps.meta.outputs.commit_short }}
            PROVIDER_NODE_GIT_DIRTY=0
            PROVIDER_NODE_BUILD_AT=${{ steps.meta.outputs.built_at }}
      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          docker rm -f wokey-provider-node-ci >/dev/null 2>&1 || true
          trap 'docker rm -f wokey-provider-node-ci >/dev/null 2>&1 || true' EXIT
          docker run -d --name wokey-provider-node-ci -p 127.0.0.1:16888:16888 wokey-provider-node:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:16888/api/status >/dev/null; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              docker logs wokey-provider-node-ci
              exit 1
            fi
            sleep 1
          done
          docker exec wokey-provider-node-ci wokey-node status
          docker exec wokey-provider-node-ci wokey-node restart | grep -q "Docker mode"
